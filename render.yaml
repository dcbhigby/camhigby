services:
  - type: web
    name: cam-higby-map
    runtime: python
    autoDeploy: true
    buildCommand: "echo 'No build step'"
    startCommand: "python3 server.py"
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: COOKIE_SECURE
        value: "1"
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_TTL_SECONDS
        value: "43200"
